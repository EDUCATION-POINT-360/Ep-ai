<!DOCTYPE html>
<html lang="en" id="app-root" class="theme-midnight">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EP AI | Final Elite</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Noto+Sans+Urdu:wght@400;700&display=swap');
        
        :root {
            --accent: #ffffff; --bg: #000; --text: #fff; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08); --glow: rgba(255, 255, 255, 0.05);
        }

        /* 🌈 All Themes */
        .theme-midnight { --accent: #fff; --bg: #020202; --text: #fff; --glow: rgba(255,255,255,0.05); }
        .theme-white-lucid { --accent: #000; --bg: #ffffff; --text: #0f172a; --glass: rgba(0,0,0,0.02); --border: rgba(0,0,0,0.08); --glow: rgba(0,0,0,0.01); }
        .theme-emerald { --accent: #10b981; --bg: #010503; --text: #ecfdf5; --glow: rgba(16,185,129,0.1); }
        .theme-royal { --accent: #fbbf24; --bg: #050401; --text: #fff; --glow: rgba(251,191,36,0.1); }

        * { -webkit-user-select: none !important; user-select: none !important; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); outline: none; }
        .selectable { -webkit-user-select: text !important; user-select: text !important; }

        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans Urdu', sans-serif; 
            background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
        }

        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, var(--glow) 0%, transparent 75%); filter: blur(60px); }
        .glass-panel { background: var(--glass); backdrop-filter: blur(40px) saturate(200%); border: 1px solid var(--border); }

        #header { height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 100; border-bottom: 1px solid var(--border); }
        #scroller { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        #scroller::-webkit-scrollbar { width: 0; }

        .msg-container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 180px; }
        
        .rtl { direction: rtl; text-align: right; }
        .ltr { direction: ltr; text-align: left; }

        .user-bubble { align-self: flex-end; max-width: 85%; padding: 15px 22px; border-radius: 25px 25px 4px 25px; background: var(--glass); border: 1px solid var(--border); font-size: 16px; color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .ai-wrap { display: flex; gap: 15px; width: 100%; position: relative; }
        .ai-avatar { width: 42px; height: 42px; border-radius: 14px; background: var(--glass); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .answer-box { flex: 1; padding: 5px; }
        .copy-btn { margin-top: 15px; padding: 6px 14px; border-radius: 12px; background: var(--glass); font-size: 10px; display: flex; align-items: center; gap: 6px; border: 1px solid var(--border); color: var(--text); cursor: pointer; }
        .copy-btn:active { background: var(--accent); color: var(--bg); }

        #input-dock { position: fixed; bottom: 0; width: 100%; padding: 20px 20px 40px 20px; background: linear-gradient(to top, var(--bg) 80%, transparent); }
        .dock-container { max-width: 850px; margin: 0 auto; display: flex; align-items: flex-end; gap: 10px; padding: 10px; border-radius: 35px; border: 1px solid var(--border); background: var(--glass); }
        
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 12px; font-size: 16px; color: var(--text); resize: none; max-height: 150px; }

        /* Stop Button */
        #stop-btn { display: none; width: 44px; height: 44px; border-radius: 50%; background: #ef4444; color: #fff; align-items: center; justify-content: center; transition: 0.3s; }

        #drawer { position: fixed; left: -320px; top: 0; width: 310px; height: 100%; z-index: 1000; padding: 50px 30px; transition: 0.5s; }
        #drawer.active { left: 0; }
        .side-btn { width: 100%; padding: 16px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; background: var(--glass); border: 1px solid transparent; text-align: left; font-size: 14px; color: var(--text); }
        .side-btn:hover { border-color: var(--border); }
        
        .thinking-tag { font-size: 10px; font-weight: 800; letter-spacing: 2px; opacity: 0.2; text-transform: uppercase; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.6; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-mesh"></div>
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); display:none; z-index:900;" onclick="toggleD()"></div>
    
    <div id="drawer" class="glass-panel">
        <p class="text-[9px] font-black tracking-[0.5em] opacity-20 mb-10 uppercase">Security Control</p>
        <button onclick="clearHistory()" class="side-btn text-rose-500"><i data-lucide="trash-2"></i> Clear History</button>
        <div class="h-[1px] bg-white/5 my-6"></div>
        <button onclick="setT('midnight')" class="side-btn"><i data-lucide="moon"></i> Midnight Dark</button>
        <button onclick="setT('white-lucid')" class="side-btn"><i data-lucide="sun"></i> White Lucid</button>
        <button onclick="setT('emerald')" class="side-btn text-emerald-500"><i data-lucide="leaf"></i> Emerald Silk</button>
        <button onclick="setT('royal')" class="side-btn text-amber-500"><i data-lucide="crown"></i> Royal Gold</button>
    </div>

    <header id="header" class="glass-panel">
        <button onclick="toggleD()" class="w-11 h-11 rounded-2xl flex items-center justify-center bg-black/5 active:scale-90 transition"><i data-lucide="layout-dashboard" class="w-5 h-5 opacity-50"></i></button>
        <div class="text-center">
            <h1 class="text-[10px] font-black tracking-[0.4em] opacity-30 uppercase">Education Point Ai</h1>
            <span class="text-[8px] font-bold opacity-40 uppercase tracking-tighter"> Muhammad Rizwan</span>
        </div>
        <div class="w-11 h-11 rounded-2xl border border-white/5 flex items-center justify-center"><i data-lucide="shield-check" class="w-5 h-5 opacity-20"></i></div>
    </header>

    <div id="scroller">
        <div class="msg-container" id="chat-box">
            <div class="ai-wrap animate__animated animate__fadeIn">
                <div class="ai-avatar"><i data-lucide="bot" class="w-5 h-5 opacity-30"></i></div>
                <div class="answer-box">
                    <p class="text-[7px] font-black opacity-10 uppercase tracking-[0.3em] mb-2">Systems Online</p>
                    <div class="text-[16px] font-light opacity-80">محفوظ تعلیمی پورٹل میں خوش آمدید۔ آپ سوال پوچھ سکتے ہیں۔</div>
                </div>
            </div>
        </div>
    </div>

    <div id="input-dock">
        <div id="media-dock" class="hidden max-w-[850px] mx-auto mb-3">
            <div class="inline-flex items-center glass-panel p-2 rounded-2xl gap-3 animate__animated animate__slideInUp">
                <img id="media-src" class="w-12 h-12 rounded-xl object-cover">
                <i data-lucide="x-circle" class="w-4 h-4 opacity-30 cursor-pointer" onclick="clearM()"></i>
            </div>
        </div>
        
        <div class="dock-container glass-panel shadow-2xl">
            <label class="w-12 h-12 flex items-center justify-center opacity-30 hover:opacity-100 cursor-pointer active:scale-90">
                <i data-lucide="image-plus" class="w-5 h-5"></i>
                <input type="file" class="hidden" id="file-in" accept="image/*" onchange="previewM(event)">
            </label>
            
            <textarea id="ai-input" placeholder="Type here..." rows="1" oninput="checkLang(this)"></textarea>

            <button id="mic-btn" onclick="toggleVoice()" class="w-12 h-12 flex items-center justify-center opacity-30 active:scale-90"><i data-lucide="mic" class="w-5 h-5"></i></button>
            
            <button id="stop-btn" onclick="stopTyping()"><i data-lucide="square" class="w-4 h-4 fill-current"></i></button>

            <button id="send-btn" onclick="ask()" class="w-11 h-11 bg-white text-black rounded-full flex items-center justify-center active:scale-75 transition" style="background: var(--accent); color: var(--bg);"><i data-lucide="arrow-up" class="w-5 h-5"></i></button>
        </div>
    </div>
    <script>
        lucide.createIcons();
        
        // 🛡️ Security Suite
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

        const KEY = "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";
        const URL = "https://openrouter.ai/api/v1/chat/completions";
        let msgs = [{ role: "system", content: "Professional AI Teacher. Provide direct, clean answers without symbols like stars." }];
        let activeImg = null;
        let isTyping = false;
        let stopSignal = false;

        function toggleD() { 
            const d = document.getElementById('drawer');
            document.getElementById('overlay').style.display = d.classList.toggle('active') ? 'block' : 'none';
        }
        function setT(t) { document.getElementById('app-root').className = 'theme-' + t; toggleD(); }
        function clearHistory() { document.getElementById('chat-box').innerHTML = ""; msgs = [msgs[0]]; toggleD(); }

        // 🎙️ Voice Logic
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRec) {
            recognition = new SpeechRec();
            recognition.onresult = (e) => { 
                document.getElementById('ai-input').value = e.results[0][0].transcript;
                stopV(); setTimeout(() => ask(), 500); 
            };
            recognition.onend = () => stopV();
        }
        function toggleVoice() { recognition?.start(); document.getElementById('mic-btn').classList.add('text-red-500'); }
        function stopV() { document.getElementById('mic-btn').classList.remove('text-red-500'); recognition?.stop(); }

        function checkLang(el) { el.dir = /[\u0600-\u06FF]/.test(el.value) ? 'rtl' : 'ltr'; }

        function previewM(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (rs) => { activeImg = rs.target.result; document.getElementById('media-src').src = activeImg; document.getElementById('media-dock').classList.remove('hidden'); };
            r.readAsDataURL(f);
        }
        function clearM() { activeImg = null; document.getElementById('media-dock').classList.add('hidden'); }

        async function ask() {
            if (isTyping) return;
            const input = document.getElementById('ai-input');
            const q = input.value.trim();
            if (!q && !activeImg) return;

            render('user', q, activeImg);
            const snap = activeImg; input.value = ""; clearM(); input.style.height = "auto";
            stopSignal = false;

            const thinkId = 'think-' + Date.now();
            const thinkDiv = document.createElement('div');
            thinkDiv.id = thinkId;
            thinkDiv.className = 'ai-wrap animate__animated animate__fadeIn';
            thinkDiv.innerHTML = `<div class="ai-avatar"><i data-lucide="loader-2" class="w-4 h-4 animate-spin opacity-20"></i></div><div class="mt-3"><span class="thinking-tag">EP Ai is thinking...</span></div>`;
            document.getElementById('chat-box').appendChild(thinkDiv);
            lucide.createIcons();
            scrollToBottom();

            let content = [{ type: "text", text: q || "Explain." }];
            if (snap) content.push({ type: "image_url", image_url: { url: snap } });
            msgs.push({ role: "user", content });

            try {
                const res = await fetch(URL, { method: "POST", headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" }, body: JSON.stringify({ model: "google/gemini-2.0-flash-001", messages: msgs }) });
                const data = await res.json();
                let reply = data.choices[0].message.content.replace(/[*#_~`]/g, '');
                
                document.getElementById(thinkId).remove();
                render('ai', reply);
                msgs.push({ role: "assistant", content: reply });
            } catch (e) { document.getElementById(thinkId).innerHTML = "Error connecting."; }
        }

        function render(role, txt, img = null) {
            const box = document.getElementById('chat-box');
            const isUrdu = /[\u0600-\u06FF]/.test(txt);
            const alignClass = isUrdu ? 'rtl' : 'ltr';
            
            const div = document.createElement('div');
            div.className = role === 'user' ? `user-bubble animate__animated animate__fadeInRight ${alignClass}` : `ai-wrap animate__animated animate__fadeInUp ${alignClass}`;
            
            if (role === 'user') {
                div.innerHTML = `${img ? `<img src="${img}" class="rounded-2xl mb-3 max-h-60 w-full object-cover">` : ''}${txt}`;
            } else {
                div.innerHTML = `
                <div class="ai-avatar"><i data-lucide="zap" class="w-5 h-5 text-accent opacity-50"></i></div>
                <div class="answer-box">
                    <p class="text-[7px] font-bold opacity-10 uppercase mb-2">EP Intelligence</p>
                    <div class="typing-target selectable opacity-90 leading-relaxed text-[16px] mb-2"></div>
                    <button onclick="copyT(this)" class="copy-btn"><i data-lucide="copy" class="w-3 h-3"></i> Copy Text</button>
                </div>`;
            }
            box.appendChild(div);
            lucide.createIcons();
            scrollToBottom();
            if (role === 'ai') typeIt(div.querySelector('.typing-target'), txt);
        }

        function typeIt(el, txt) {
            let i = 0; const words = txt.split(' ');
            isTyping = true;
            document.getElementById('send-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'flex';

            function step() { 
                if (i < words.length && !stopSignal) { 
                    el.innerHTML = words.slice(0, i + 1).join(' ').replace(/\n/g, '<br>'); 
                    i++; scrollToBottom(); setTimeout(step, 15); 
                } else {
                    isTyping = false;
                    document.getElementById('send-btn').style.display = 'flex';
                    document.getElementById('stop-btn').style.display = 'none';
                }
            }
            step();
        }

        function stopTyping() { stopSignal = true; }

        function copyT(btn) {
            const text = btn.parentElement.querySelector('.typing-target').innerText;
            navigator.clipboard.writeText(text);
            btn.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> Copied!`;
            setTimeout(() => { btn.innerHTML = `<i data-lucide="copy" class="w-3 h-3"></i> Copy Text`; lucide.createIcons(); }, 2000);
            lucide.createIcons();
        }

        function scrollToBottom() { const s = document.getElementById('scroller'); s.scrollTop = s.scrollHeight; }
        document.getElementById('ai-input').oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; checkLang(this); };
    </script>
</body>
</html>
